name: Build & Push Docker Image

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]   # build aussi sur chaque tag
  pull_request:
    branches: [ "main" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout du code
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2. Login au registre Docker Hub (ou GitHub Registry)
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 3. Build l’image
      - name: Build Docker image
        run: |
          docker build -t arinomena/fiarahantsika-backend:latest .

      # 4. Push l’image
      - name: Push Docker image
        run: |
          docker push arinomena/fiarahantsika-backend:latest
