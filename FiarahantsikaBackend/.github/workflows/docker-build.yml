name: Build & Push Docker Image (Backend)

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set image tags
        id: vars
        run: |
          echo "sha_tag=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "git_tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Build Docker image
        run: |
          docker build -t arinomena/fiarahantsika-backend:latest .
          docker build -t arinomena/fiarahantsika-backend:${{ steps.vars.outputs.sha_tag }} .
          if [ -n "${{ steps.vars.outputs.git_tag }}" ]; then
            docker build -t arinomena/fiarahantsika-backend:${{ steps.vars.outputs.git_tag }} .
          fi

      - name: Push Docker image
        run: |
          docker push arinomena/fiarahantsika-backend:latest
          docker push arinomena/fiarahantsika-backend:${{ steps.vars.outputs.sha_tag }}
          if [ -n "${{ steps.vars.outputs.git_tag }}" ]; then
            docker push arinomena/fiarahantsika-backend:${{ steps.vars.outputs.git_tag }}
          fi
