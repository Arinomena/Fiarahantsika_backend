# JWT & AOP dÈj‡ prÈsents
spring.application.name=FiarahantsikaBackend
jwt.secret=ChangeThisToA32+ByteRandomString123456
jwt.expiration-ms=3600000
spring.aop.proxy-target-class=false

spring.datasource.username=root
spring.datasource.password=root
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/fiarahantsika_dev?useSSL=false

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
logging.level.org.hibernate.SQL=debug
logging.level.org.hibernate.type.descriptor.sql=trace
logging.level.com.fiarahantsika.backend.order=DEBUG
