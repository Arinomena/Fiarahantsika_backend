name: CI/CD Backend
on:
  push:
    branches: [ "main" ]
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # 1. Installer Java sur le runner GitHub
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # 2. Compiler le projet (C'est cette étape qui crée le dossier /target)
      - name: Build with Maven
        run: mvn -f FiarahantsikaBackend/pom.xml clean package -DskipTests

      - name: Login Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # 3. Maintenant Docker va trouver le dossier target/*.jar
      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: ./FiarahantsikaBackend
          file: ./FiarahantsikaBackend/Dockerfile
          push: true
          tags: arinomena/fiarahantsika-backend:latest